<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="black"/>

  <!-- Main Title -->
  <text x="50%" y="140" text-anchor="middle"
        fill="white"
        font-family="Arial, Helvetica, sans-serif"
        font-size="80"
        font-weight="500">
    l’oste e il sacrestano
  </text>

  <!-- Gold Lines -->
  <path d="M200 190 Q600 140 1000 180"
        stroke="#c9a46b"
        stroke-width="5"
        fill="none"
        stroke-linecap="round"/>

  <path d="M300 210 Q650 170 1050 200"
        stroke="#c9a46b"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="50%" y="300" text-anchor="middle"
        fill="white"
        font-family="Arial, Helvetica, sans-serif"
        font-size="36"
        letter-spacing="8">
    peppe bonsignore
  </text>

  <!-- Gold dots -->
  <circle cx="250" cy="290" r="6" fill="#c9a46b"/>
  <circle cx="950" cy="290" r="6" fill="#c9a46b"/>

</svg>